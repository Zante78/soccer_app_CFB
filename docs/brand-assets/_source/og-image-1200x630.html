<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; }
  .og {
    width: 1200px;
    height: 630px;
    background: #FFFFFF;
    position: relative;
    font-family: 'DM Sans', sans-serif;
    color: #111820;
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    padding: 80px;
    box-sizing: border-box;
    gap: 60px;
  }
  /* Vereinsblauer Balken links oben */
  .og::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 12px;
    background: #004A9F;
  }
  /* Rheingrüner Akzent-Strich rechts unten (funktionaler Farbtupfer) */
  .og::after {
    content: '';
    position: absolute;
    bottom: 40px; right: 80px;
    width: 60px;
    height: 4px;
    background: #2D9B5A;
  }

  .content-left {
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .eyebrow {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #004A9F;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .eyebrow::before {
    content: '';
    display: inline-block;
    width: 40px;
    height: 3px;
    background: #004A9F;
  }

  .headline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 96px;
    line-height: 0.92;
    letter-spacing: 1px;
    color: #004A9F;
    margin: 0 0 20px;
  }

  .subtitle {
    font-family: 'DM Sans', sans-serif;
    font-size: 22px;
    line-height: 1.5;
    color: #4A5568;
    max-width: 480px;
  }

  .club-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 16px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #004A9F;
    margin-top: 32px;
  }

  .content-right {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
  }

  .logo {
    max-width: 100%;
    max-height: 400px;
    width: auto;
    height: auto;
  }
</style>
</head>
<body>
<div class="og">
  <div class="content-left">
    <div class="eyebrow">Digitale Passstelle</div>
    <h1 class="headline">
      Anmeldung.<br>
      Digital.
    </h1>
    <p class="subtitle">
      Vom ersten Klick bis zum aktiven Spielerpass in wenigen Minuten. Sicher, DSGVO-konform, ohne Papier.
    </p>
    <div class="club-name">CfB Ford Köln-Niehl 09/52 e.V.</div>
  </div>
  <div class="content-right">
    <img class="logo" src="../cfb-logo-master.jpg" alt="CfB Ford Köln-Niehl Vereinswappen">
  </div>
</div>
</body>
</html>
